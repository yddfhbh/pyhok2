```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>익명 채팅방</title>
 
<style>
body {
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
}

#chat {
    list-style: none;
    padding: 0;
    max-width: 400px;
    margin: 20px auto;
}

li {
    background: white;
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
}

input {
    padding: 10px;
    width: 250px;
    border-radius: 10px;
}

button {
    padding: 10px;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    border: none;
}
</style>
</head>

<body>

<h1>💬 익명 채팅방</h1>

<input id="msg" placeholder="메시지 입력">
<button onclick="send()">보내기</button>

<ul id="chat"></ul>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// 🔥 네 Firebase 설정 (이미 넣어줌)
const firebaseConfig = {
  apiKey: "AIzaSyAeu-RqEZCtssVoSNR8yQUmKewOxj93TJk",
  authDomain: "pyhok-96963.firebaseapp.com",
  databaseURL: "https://pyhok-96963-default-rtdb.firebaseio.com",
  projectId: "pyhok-96963",
  storageBucket: "pyhok-96963.firebasestorage.app",
  messagingSenderId: "950464894300",
  appId: "1:950464894300:web:c0b4ab79699858e2b05d99",
  measurementId: "G-YGT5J847KY"
};

// 초기화
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 메시지 보내기
function send() {
    let text = document.getElementById("msg").value;

    if (text.trim() === "") return;

    db.ref("chat").push({
        message: text
    });

    document.getElementById("msg").value = "";
}

// 엔터로 전송
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// 실시간 채팅 표시
db.ref("chat").on("child_added", function(data) {
    let msg = data.val().message;

    let li = document.createElement("li");
    li.innerText = msg;

    document.getElementById("chat").appendChild(li);

    window.scrollTo(0, document.body.scrollHeight);
});
</script>

</body>
</html>
```
